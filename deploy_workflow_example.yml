name: Deploy Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build and Push Docker Image
        run: |
          echo "Building Docker image..."
          # docker build -t my-app .
          # docker push my-app

      - name: Deploy to K8s
        id: k8s_deploy
        run: |
          echo "Deploying to Kubernetes..."
          # kubectl apply -f k8s/
          # Simulating success
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 📢 Notify KAOS Ingestion (Success)
        if: success()
        run: |
          curl -X POST https://api.kaos.com/webhooks/deployment \
          -H "Content-Type: application/json" \
          -d '{
            "service": "PaymentService",
            "version": "${{ github.sha }}",
            "status": "success",
            "logs": "Deployment successful to prod-us-east-1"
          }'

      - name: 📢 Notify KAOS Ingestion (Failure)
        if: failure()
        run: |
          curl -X POST https://api.kaos.com/webhooks/deployment \
          -H "Content-Type: application/json" \
          -d '{
            "service": "PaymentService",
            "version": "${{ github.sha }}",
            "status": "failure",
            "logs": "Kubernetes Error: ImagePullBackOff..."
          }'
