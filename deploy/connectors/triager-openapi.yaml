openapi: 3.0.0
info:
  title: KAOS Triager Lambda API
  version: 1.0.0
servers:
  - url: https://dnqhak6oxc.execute-api.ap-south-1.amazonaws.com
paths:
  /triager/process:
    post:
      operationId: processEvent
      summary: Process a quality report event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Event processed successfully
          content:
            application/json:
              schema:
                type: object
