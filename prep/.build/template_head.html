<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @page {
    size: A4;
    margin: 18mm 16mm 20mm 16mm;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.55;
    color: #1f2328;
    max-width: 100%;
    margin: 0;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  h1, h2, h3, h4 { line-height: 1.25; font-weight: 700; margin-top: 1.2em; margin-bottom: 0.5em; }
  h1 {
    font-size: 21pt; color: #0b3d5c; border-bottom: 3px solid #2563eb;
    padding-bottom: 0.25em; margin-top: 0;
  }
  h2 {
    font-size: 15.5pt; color: #0b3d5c; border-bottom: 1px solid #d0d7de;
    padding-bottom: 0.2em; margin-top: 1.6em;
  }
  h3 { font-size: 12.5pt; color: #1a4d6e; }
  h4 { font-size: 11pt; color: #334155; }
  p { margin: 0.5em 0; }
  a { color: #2563eb; text-decoration: none; }
  strong { color: #111827; }
  blockquote {
    margin: 0.8em 0; padding: 0.4em 1em; color: #3d4451;
    border-left: 4px solid #2563eb; background: #f1f5fb; border-radius: 0 4px 4px 0;
  }
  blockquote p { margin: 0.3em 0; }
  ul, ol { margin: 0.5em 0; padding-left: 1.5em; }
  li { margin: 0.25em 0; }
  code {
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 9pt; background: #eef1f5; padding: 0.12em 0.4em;
    border-radius: 4px; color: #b3306b;
  }
  pre {
    background: #1e293b; color: #e2e8f0; padding: 12px 14px;
    border-radius: 7px; overflow-x: auto; font-size: 8.2pt;
    line-height: 1.45; page-break-inside: avoid;
  }
  pre code {
    background: transparent; color: inherit; padding: 0;
    font-size: 8.2pt; white-space: pre; color: #e2e8f0;
  }
  table {
    border-collapse: collapse; width: 100%; margin: 0.9em 0;
    font-size: 9pt; page-break-inside: avoid;
  }
  th, td { border: 1px solid #d0d7de; padding: 6px 9px; text-align: left; vertical-align: top; }
  th { background: #2563eb; color: #fff; font-weight: 600; }
  tr:nth-child(even) td { background: #f6f8fa; }
  hr { border: none; border-top: 1px solid #d0d7de; margin: 1.5em 0; }
  h2, h3 { page-break-after: avoid; }
  pre, table, blockquote { page-break-inside: avoid; }
</style>
</head>
<body>
